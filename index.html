<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PiqAi</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --blur-bg: rgba(15,15,25,0.55);
  --glass: rgba(255,255,255,0.07);
  --glass-border: rgba(255,255,255,0.12);
  --text: #f5f5f7;
  --muted: rgba(255,255,255,0.45);
}

body {
  min-height: 100vh;
  background: #0a0a12;
  color: var(--text);
  font-family: 'Inter', sans-serif;
  overflow-x: hidden;
}

/* Animated Background */
.bg-mesh {
  position: fixed;
  inset: -50px;
  z-index: 0;
  background:
    radial-gradient(ellipse 80% 60% at 20% 10%, rgba(120,60,220,0.22) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 80% 80%, rgba(30,180,255,0.18) 0%, transparent 60%),
    radial-gradient(ellipse 50% 40% at 60% 30%, rgba(255,80,160,0.13) 0%, transparent 55%),
    radial-gradient(ellipse 70% 60% at 10% 70%, rgba(0,220,180,0.10) 0%, transparent 55%);
  animation: meshMove 12s ease-in-out infinite alternate;
}

@keyframes meshMove {
  0%   { filter: hue-rotate(0deg) brightness(1); transform: translateY(0); }
  100% { filter: hue-rotate(20deg) brightness(1.1); transform: translateY(-10px); }
}

.bg-mesh::after {
  content:'';
  position:absolute; inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E");
  opacity:0.5; pointer-events:none;
}

/* FILTER & SEARCH BAR CONTAINER */
.top-bar-wrap {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(10,10,18,0.7);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--glass-border);
  padding: 12px;
  max-width: 600px;
  margin: 0 auto;
  display: flex;
  flex-direction: row;
  align-items: center;
  gap: 10px;
}

/* Search Box */
.search-box-wrap {
  position: relative;
  width: 40px;
  height: 40px;
  flex-shrink: 0;
  border-radius: 50px;
  background: var(--glass);
  border: 1px solid var(--glass-border);
  transition: all 0.3s ease;
  display: flex;
  align-items: center;
  overflow: hidden;
  cursor: text;
}

.search-box-wrap:focus-within {
  width: 140px;
  background: rgba(255,255,255,0.08);
  border-color: rgba(168,85,247,0.6);
  box-shadow: 0 0 10px rgba(168,85,247,0.2);
}

.search-icon {
  position: absolute;
  left: 12px;
  font-size: 16px;
  pointer-events: none;
}

.search-input {
  width: 100%;
  height: 100%;
  padding: 0 10px 0 36px;
  background: transparent;
  border: none;
  color: #fff;
  font-size: 13px;
  outline: none;
  font-family: 'Inter', sans-serif;
}
.search-input::placeholder { color: transparent; transition: color 0.2s; }
.search-box-wrap:focus-within .search-input::placeholder { color: var(--muted); }
.search-input::-webkit-outer-spin-button, .search-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

/* Animated Telegram Button */
.telegram-btn {
  width: 40px;
  height: 40px;
  flex-shrink: 0;
  background: #0088cc;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 12px rgba(0, 136, 204, 0.4);
  text-decoration: none;
  animation: floatBounce 1.8s ease-in-out infinite;
  transition: transform 0.2s;
}

.telegram-btn:hover {
  background: #0099e6;
  animation-play-state: paused;
  transform: scale(1.1);
}

.telegram-btn svg {
  width: 20px;
  height: 20px;
  fill: #fff;
  transform: translateX(-1px);
}

@keyframes floatBounce {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-7px); }
  100% { transform: translateY(0px); }
}

/* Filters */
.filter-scroll {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  scrollbar-width: none;
  flex-grow: 1;
  min-width: 0;
}
.filter-scroll::-webkit-scrollbar { display:none; }

.pill {
  flex-shrink: 0;
  padding: 8px 16px;
  border-radius: 100px;
  font-size: 12.5px;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid var(--glass-border);
  background: var(--glass);
  color: var(--muted);
  transition: all 0.2s;
}
.pill:hover { color: var(--text); background: rgba(255,255,255,0.1); }
.pill.active {
  background: rgba(255,255,255,0.18);
  border-color: rgba(255,255,255,0.35);
  color: #fff;
}

/* Grid & Cards - UPDATED TO MASONRY 3D ASPECT RATIO */
.grid {
  position: relative;
  z-index: 10;
  column-count: 2;
  column-gap: 8px;
  padding: 8px;
  max-width: 600px;
  margin: 0 auto;
}

.card {
  break-inside: avoid;
  margin-bottom: 8px;
  border-radius: 14px;
  overflow: hidden;
  position: relative;
  cursor: pointer;
  background: var(--glass);
  border: 1px solid var(--glass-border);
  transition: transform 0.3s ease, box-shadow 0.3s ease;
  animation: cardIn 0.4s ease both;
  
  /* 3D Properties */
  transform-style: preserve-3d;
  perspective: 1000px;
}

.card:hover { 
  transform: translateY(-4px) scale(1.02); 
  box-shadow: 0 15px 30px rgba(0,0,0,0.5);
  border-color: rgba(168,85,247,0.4);
}
.card:active { transform: translateY(0) scale(0.98); }

@keyframes cardIn {
  from { opacity:0; transform: scale(0.93) translateY(10px); }
  to   { opacity:1; transform: scale(1) translateY(0); }
}

.card img {
  width: 100%;
  height: auto; /* Ensures image maintains original aspect ratio */
  display: block;
}

/* Number Tag */
.card-number-tag {
  position: absolute;
  bottom: 10px; right: 10px;
  z-index: 15;
  background: rgba(0,0,0,0.65);
  backdrop-filter: blur(5px);
  border: 1px solid rgba(255,255,255,0.15);
  padding: 2px 8px;
  border-radius: 100px;
  font-size: 10px;
  font-weight: 600;
  color: rgba(255,255,255,0.9);
}

/* Top Tag */
.card-top-tag {
  position: absolute;
  top: 10px; left: 10px;
  background: rgba(0,0,0,0.45);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 100px;
  padding: 4px 10px;
  font-size: 10px;
  font-weight: 600;
  color: #fff;
  z-index: 15;
}

/* Small Title Tag */
.card-title-wrap {
  position: absolute;
  bottom: 10px; left: 10px;
  z-index: 15;
  max-width: calc(100% - 60px);
}
.card-title {
  font-family: 'Syne', sans-serif;
  font-size: 10px;
  font-weight: 600;
  color: #fff;
  background: rgba(0,0,0,0.45);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 100px;
  padding: 2px 8px;
  display: inline-block;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 100%;
}

/* Modal */
.overlay { display: none; position: fixed; inset: 0; z-index: 999; background: rgba(0,0,0,0.7); backdrop-filter: blur(12px); align-items: flex-end; justify-content: center; }
.overlay.show { display: flex; animation: overlayIn 0.25s ease; }
@keyframes overlayIn { from { opacity: 0; } to { opacity: 1; } }

.modal { width: 100%; max-width: 600px; background: rgba(18,18,30,0.95); border-radius: 24px 24px 0 0; max-height: 92vh; overflow-y: auto; padding-top: 10px;}
.modal-handle { width: 36px; height: 4px; background: rgba(255,255,255,0.2); border-radius: 100px; margin: 0 auto 16px; }
.close-btn { position: absolute; top: 16px; right: 16px; background: rgba(255,255,255,0.1); border: none; color: var(--muted); width: 30px; height: 30px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 1000; }

/* PiqAi Brand Title inside Modal */
.brand-title {
  font-family: 'Syne', sans-serif;
  font-size: 26px;
  font-weight: 800;
  text-align: center;
  color: #fff;
  margin-bottom: 16px;
  background: -webkit-linear-gradient(45deg, #a855f7, #3b82f6);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  letter-spacing: 1px;
}

/* Prompts */
.prompt-section { padding: 0 16px 20px; display: none; }
.prompt-section.show { display: block; animation: fadeIn 0.4s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

.prompt-image { width: 100%; border-radius: 14px; max-height: 400px; object-fit: contain; margin-bottom: 16px; background: #000; }
.prompt-box { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 14px; font-size: 13px; line-height: 1.6; color: rgba(255,255,255,0.85); margin-bottom: 12px; }

/* Buttons */
.copy-btn { width: 100%; padding: 14px; border-radius: 14px; background: linear-gradient(135deg, #a855f7, #3b82f6); border: none; color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; transition: transform 0.1s; }
.copy-btn.copied { background: linear-gradient(135deg, #22c55e, #10b8e9); }
.copy-btn:active { transform: scale(0.98); }

.ai-redirect-wrap { display: flex; gap: 8px; margin-top: 8px; }
.ai-btn { flex: 1; padding: 11px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.06); color: #fff; font-size: 12.5px; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; transition: all 0.2s; }
.ai-btn:hover { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.2); }

.load-more-wrap { padding: 10px 16px 30px; display: flex; justify-content: center; position: relative; z-index: 10; max-width: 600px; margin: 0 auto;}
.load-more-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 12px 30px; border-radius: 100px; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.3s; display: none; }
.load-more-btn:hover { background: rgba(255,255,255,0.2); }

.empty { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 14px; display: none; }
.empty.show { display: block; }

.instruction-box { background: rgba(168, 85, 247, 0.06); border: 1px solid rgba(168, 85, 247, 0.15); border-radius: 12px; padding: 12px; margin-bottom: 14px; }
.instruction-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.instruction-title { font-size: 12px; font-weight: 600; text-transform: uppercase; color: #a855f7; }
.lang-dropdown { background: #181824; color: #fff; border: 1px solid rgba(255,255,255,0.15); padding: 3px 8px; border-radius: 6px; font-size: 11px; outline: none; cursor: pointer; }
.instruction-text { font-size: 12px; color: rgba(255,255,255,0.7); line-height: 1.5; }
</style>
</head>
<body>

<div class="bg-mesh"></div>

<div class="top-bar-wrap">
  <label class="search-box-wrap" for="numSearch">
    <span class="search-icon">🔍</span>
    <input type="number" class="search-input" id="numSearch" placeholder="No..." oninput="handleSearch()">
  </label>
  
  <a href="https://t.me/your_channel_link" target="_blank" class="telegram-btn" title="Join Telegram">
    <svg viewBox="0 0 24 24">
      <path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.892-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/>
    </svg>
  </a>

  <div class="filter-scroll" id="filterScroll"></div>
</div>

<div class="grid" id="grid"></div>
<div class="empty" id="empty">No matches found.</div>

<div class="load-more-wrap">
  <button id="loadMoreBtn" class="load-more-btn" onclick="loadMore()">Load More Images</button>
</div>

<div class="overlay" id="overlay" onclick="handleOverlay(event)">
  <div class="modal" id="modal">
    <div class="modal-handle"></div>
    <button class="close-btn" onclick="closeModal()">✕</button>
    
    <div class="prompt-section" id="promptSection">
      <div class="brand-title">PiqAi</div>
      
      <img src="" id="modalImg" class="prompt-image" alt="">
      
      <div class="instruction-box">
        <div class="instruction-header">
          <span class="instruction-title">💡 How to use</span>
          <select class="lang-dropdown" id="langSelect" onchange="changeLanguage()">
            <option value="bn">বাংলা</option>
            <option value="en">English</option>
            <option value="hi">हिन्दी</option>
            <option value="te">తెలుగు</option>
            <option value="ta">தமிழ்</option>
            <option value="mr">मराठी</option>
            <option value="gu">ગુજરાતી</option>
            <option value="ml">മലയാളം</option>
            <option value="kn">ಕನ್ನಡ</option>
          </select>
        </div>
        <div class="instruction-text" id="instructionText"></div>
      </div>
      
      <div class="prompt-box" id="modalPrompt"></div>
      <button class="copy-btn" id="copyBtn" onclick="copyPrompt()">📋 Copy Prompt</button>
      
      <div class="ai-redirect-wrap">
        <button class="ai-btn" onclick="redirectToAI('gpt')">💬 ChatGPT</button>
        <button class="ai-btn" onclick="redirectToAI('gemini')">✨ Google Gemini</button>
      </div>
    </div>
  </div>
</div>

<script>
const SPREADSHEET_ID = '1eGVpHBZC0rF-JGEPq9vh353H-BYQnUOHcaM3FNVPOzM'; 
const SHEET_NAME = 'Sheet1'; 

let DATA = []; 
let activeFilter = "All";
let currentData = null;
let searchQuery = "";

// Pagination Variables
let currentPage = 1;
const ITEMS_PER_PAGE = 50;

const TRANSLATIONS = {
  bn: "প্রম্পটটি কপি করুন, তারপর নিচে থাকা বাটনটি ক্লিক করে চ্যাটজিপিটি বা জেমিনি এআই তে গিয়ে পেস্ট করে আপনার ইউনিক ইমেজ তৈরি করে নিন।",
  en: "Copy the prompt, then click on the buttons below to open ChatGPT or Gemini AI. Paste the prompt there.",
  hi: "प्रॉम्प्ट कॉपी करें, फिर नीचे दिए गए बटन पर क्लिक करके ChatGPT या Gemini AI खोलें और वहां प्रॉम्प्ट पेस्ट करें।",
  te: "ప్రాంప్ట్‌ను కాపీ చేయండి, ఆపై ChatGPT లేదా Gemini AIని తెరవడానికి క్రింది బటన్లపై క్లిక్ చేయండి. అక్కడ ప్రాంప్ట్‌ను పేస్ట్ చేయండి.",
  ta: "ப்ராம்ட்டை காப்பி செய்து, பின்னர் ChatGPT அல்லது Gemini AI ஐத் திறக்க கீழே உள்ள பட்டன்களைக் கிளிக் செய்யவும். அங்கு ப்ராம்ட்டை பேஸ்ட் செய்யவும்.",
  mr: "प्रॉम्प्ट कॉपी करा, त्यानंतर ChatGPT किंवा Gemini AI उघडण्यासाठी खालील बटणांवर क्लिक करा आणि तिथे प्रॉम्प्ट पेस्ट करा.",
  gu: "પ્રોમ્પ્ટ કૉપિ કરો, પછી ChatGPT અથવા Gemini AI ખોલવા માટે નીચેના બટનો પર ક્લિક કરો અને ત્યાં પેસ્ટ કરો.",
  ml: "പ്രോംപ്റ്റ് കോപ്പി ചെയ്യുക, തുടർന്ന് ChatGPT അല്ലെങ്കിൽ Gemini AI തുറക്കാൻ താഴെയുള്ള ബട്ടണുകളിൽ ക്ലിക്ക് ചെയ്യുക. അവിടെ പ്രോംപ്റ്റ് പേസ്റ്റ് ചെയ്യുക.",
  kn: "ಪ್ರಾಂಪ್ಟ್ ಅನ್ನು ಕಾಪಿ ಮಾಡಿ, ನಂತರ ChatGPT ಅಥವಾ Gemini AI ಅನ್ನು ತೆರೆಯಲು ಕೆಳಗಿನ ಬಟನ್‌ಗಳ ಮೇಲೆ ಕ್ಲಿಕ್ ಮಾಡಿ. ಅಲ್ಲಿ ಪ್ರಾಂಪ್ಟ್ ಅನ್ನು ಪೇಸ್ಟ್ ಮಾಡಿ।"
};

const FILTERS = [
  "All", "Instagram", "Facebook", "WhatsApp", "Status", "Snapchat", 
  "Ocean", "Cartoon", "Anime", "cinematic", "realistic", "family", "friend", "game"
];

async function fetchSheetData() {
  const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json&sheet=${SHEET_NAME}`;
  try {
    const response = await fetch(url);
    const text = await response.text();
    const jsonText = text.substring(text.indexOf("{"), text.lastIndexOf("}") + 1);
    const json = JSON.parse(jsonText);
    const rows = json.table.rows;

    DATA = rows.map(row => {
      return {
        number: row.c[0] ? Number(row.c[0].v) : 0,
        filter: row.c[1] ? row.c[1].v : "",
        title: row.c[2] ? row.c[2].v : "",
        img: row.c[3] ? row.c[3].v : "",
        prompt: row.c[4] ? row.c[4].v : "",
        instructions: {
          bn: row.c[5] ? row.c[5].v : "",
          en: row.c[6] ? row.c[6].v : ""
        }
      };
    });

    DATA.sort((a, b) => (b.number || 0) - (a.number || 0));
    
    let top10 = DATA.slice(0, 10);
    let remaining = DATA.slice(10);
    
    for (let i = remaining.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [remaining[i], remaining[j]] = [remaining[j], remaining[i]];
    }
    
    DATA = top10.concat(remaining);

    buildFilters();
    buildGrid();
  } catch (error) {
    console.error("Error fetching data from Google Sheet:", error);
    document.getElementById('empty').textContent = "Network Error, Please Refresh";
    document.getElementById('empty').classList.add('show');
  }
}

function buildFilters() {
  const wrap = document.getElementById('filterScroll');
  if(!wrap) return;
  wrap.innerHTML = '';
  
  for(let i=0; i<FILTERS.length; i++) {
    let f = FILTERS[i];
    let btn = document.createElement('button');
    btn.className = 'pill' + (f === activeFilter ? ' active' : '');
    btn.textContent = f;
    btn.onclick = function() { 
      activeFilter = f;
      currentPage = 1; // Reset pagination on filter
      buildFilters(); 
      buildGrid(); 
    };
    wrap.appendChild(btn);
  }
}

function handleSearch() {
  searchQuery = document.getElementById('numSearch').value.trim();
  currentPage = 1; // Reset pagination on search
  buildGrid();
}

function buildGrid() {
  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty');
  const loadMoreBtn = document.getElementById('loadMoreBtn');
  if(!grid || !empty) return;
  
  let filtered = DATA.filter(function(item) {
    let filterVal = item.filter ? item.filter.toLowerCase() : "";
    let activeVal = activeFilter ? activeFilter.toLowerCase() : "all";
    
    const matchesFilter = (activeFilter === 'All' || filterVal === activeVal);
    const matchesSearch = (searchQuery === '' || item.number.toString() === searchQuery);
    return matchesFilter && matchesSearch;
  });

  if (filtered.length === 0) {
    grid.innerHTML = '';
    empty.classList.add('show');
    loadMoreBtn.style.display = 'none';
    return;
  }
  
  empty.classList.remove('show');

  // Pagination Logic
  let paginated = filtered.slice(0, currentPage * ITEMS_PER_PAGE);
  let htmlStr = "";
  
  for(let i=0; i<paginated.length; i++) {
    let item = paginated[i];
    let actualIndex = DATA.indexOf(item);
    
    htmlStr += '<div class="card" onclick="openModal('+actualIndex+')">' +
                 '<img src="'+item.img+'" alt="'+item.title+'" loading="lazy">' +
                 '<div class="card-top-tag">'+item.filter+'</div>' +
                 '<div class="card-number-tag">No. '+item.number+'</div>' +
                 '<div class="card-title-wrap">' +
                   '<div class="card-title">'+item.title+'</div>' +
                 '</div>' +
               '</div>';
  }
  grid.innerHTML = htmlStr;

  // Show or Hide "Load More" button
  if (filtered.length > currentPage * ITEMS_PER_PAGE) {
    loadMoreBtn.style.display = 'inline-block';
  } else {
    loadMoreBtn.style.display = 'none';
  }
}

function loadMore() {
  currentPage++;
  buildGrid();
}

function openModal(index) {
  currentData = DATA[index];
  document.getElementById('modalImg').src = currentData.img;
  document.getElementById('modalPrompt').textContent = currentData.prompt;
  
  // Directly show prompt, removed timer and ads
  document.getElementById('promptSection').classList.add('show');
  
  document.getElementById('langSelect').value = 'bn'; 
  changeLanguage();

  const copyBtn = document.getElementById('copyBtn');
  copyBtn.textContent = '📋 Copy Prompt';
  copyBtn.classList.remove('copied');

  document.getElementById('overlay').classList.add('show');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('overlay').classList.remove('show');
  document.body.style.overflow = '';
}

function handleOverlay(e) {
  if (e.target === document.getElementById('overlay')) closeModal();
}

function copyPrompt() {
  var textToCopy = currentData.prompt;
  
  function showSuccess() {
    var btn = document.getElementById('copyBtn');
    btn.textContent = '✓ Copied!';
    btn.classList.add('copied');
    setTimeout(function() { 
      btn.textContent = '📋 Copy Prompt'; 
      btn.classList.remove('copied'); 
    }, 2000);
  }

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(textToCopy).then(showSuccess).catch(function() {
      fallbackCopyPrompt(textToCopy, showSuccess);
    });
  } else {
    fallbackCopyPrompt(textToCopy, showSuccess);
  }
}

function fallbackCopyPrompt(text, successCallback) {
  var textArea = document.createElement("textarea");
  textArea.value = text;
  textArea.style.position = "fixed"; 
  textArea.style.top = "0";
  textArea.style.left = "0";
  textArea.style.opacity = "0";
  document.body.appendChild(textArea);
  textArea.focus();
  textArea.select();
  try {
    var successful = document.execCommand('copy');
    if (successful) {
      successCallback();
    } else {
      alert('কোড কপি করা যায়নি, দয়া করে টেক্সটটি সিলেক্ট করে কপি করুন।');
    }
  } catch (err) {
    console.error('Fallback Copy Error:', err);
  }
  document.body.removeChild(textArea);
}

function changeLanguage() {
  const selectedLang = document.getElementById('langSelect').value;
  const insTextBox = document.getElementById('instructionText');
  
  if (!currentData || !currentData.instructions) return;

  if (selectedLang === 'bn') {
    insTextBox.textContent = currentData.instructions.bn || currentData.instructions.en || TRANSLATIONS['bn'];
  } else if (selectedLang === 'en') {
    insTextBox.textContent = currentData.instructions.en || TRANSLATIONS['en'];
  } else {
    if (currentData.instructions.en) {
      insTextBox.textContent = currentData.instructions.en;

      const textToTranslate = currentData.instructions.en;
      const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=${selectedLang}&dt=t&q=${encodeURIComponent(textToTranslate)}`;

      fetch(url)
        .then(res => res.json())
        .then(json => {
          const currentSelectedLang = document.getElementById('langSelect').value;
          if (currentSelectedLang === selectedLang) {
            let translatedText = "";
            if (json && json[0]) {
              for (let i = 0; i < json[0].length; i++) {
                if (json[0][i][0]) {
                  translatedText += json[0][i][0];
                }
              }
            }
            if (translatedText) {
              insTextBox.textContent = translatedText;
            }
          }
        })
        .catch(err => console.error("Translation Error:", err));
    } else {
      insTextBox.textContent = TRANSLATIONS[selectedLang] || TRANSLATIONS['bn'];
    }
  }
}

function redirectToAI(platform) {
  if (platform === 'gpt') window.open('https://chatgpt.com', '_blank');
  else if (platform === 'gemini') window.open('https://gemini.google.com', '_blank');
}

window.onload = function() {
  fetchSheetData();
};
